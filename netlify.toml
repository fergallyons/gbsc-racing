[build]
  functions = "netlify/functions"

# Stripe Payment Link success redirect — Stripe sends crew back here after card payment
[[redirects]]
  from = "/stripe-success"
  to = "/?stripe_success=1"
  status = 302

# Catch-all for any unknown path — serves the app so JS handles routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# HTML and JS/CSS — never cache at CDN; always serve fresh
# (no content-hash in filenames, so CDN must revalidate on every deploy)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/app.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/style.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Static assets that never change — cache for a year
[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
